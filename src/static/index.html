<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonrode Download Toolkit — Web App</title>
    <meta name="description" content="High-performance media search and direct stream resolver.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d0f17;
            --bg-card: rgba(23, 27, 44, 0.65);
            --bg-card-hover: rgba(35, 42, 68, 0.8);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --accent-color: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --radius-main: 16px;
            --radius-btn: 10px;
            --shadow-glow: 0 0 25px rgba(168, 85, 247, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Search Bar Container */
        .search-box {
            position: relative;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 50px;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: var(--shadow-glow);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1.1rem;
            padding: 0.8rem 1.5rem;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .btn-search {
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            border-radius: 40px;
            padding: 0.8rem 1.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-search:hover {
            opacity: 0.95;
            transform: scale(1.02);
        }

        .btn-search:active {
            transform: scale(0.98);
        }

        /* Results List */
        .results-section {
            margin-top: 1rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.2rem;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-main);
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-4px);
            border-color: rgba(168, 85, 247, 0.3);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .card-badge {
            align-self: flex-start;
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Spinner & Skeleton */
        .spinner-container {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal Overlay for Episodes */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 12, 20, 0.8);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal {
            background: rgba(23, 27, 44, 0.95);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            width: 100%;
            max-width: 650px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .btn-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.2rem;
            line-height: 1;
        }

        .btn-close:hover { color: var(--text-main); }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .episode-row {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-btn);
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s ease;
        }

        .episode-row:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .ep-label {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .btn-download {
            background: var(--accent-gradient);
            color: #fff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-download:hover { opacity: 0.9; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Anonrode Download Toolkit</h1>
            <p>Direct Stream & Video Resolver — Fast, Clean & Server-Powered</p>
        </header>

        <!-- Search Bar -->
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="Search for movies, anime, or series..." id="query">
            <button id="searchBtn" class="btn-search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Search
            </button>
        </div>

        <!-- Spinner -->
        <div id="spinner" class="spinner-container">
            <div class="spinner"></div>
        </div>

        <!-- Results Section -->
        <div class="results-section">
            <div id="resultsTitle" class="section-title" style="display: none;">
                <span>Search Results</span>
            </div>
            <div id="resultsGrid" class="results-grid"></div>
        </div>
    </div>

    <!-- Episode Modal -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle" class="modal-title">Select Episode</h3>
                <button id="closeModal" class="btn-close">&times;</button>
            </div>
            <div id="modalBody" class="modal-body">
                <!-- Episodes loaded dynamically -->
            </div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsGrid = document.getElementById('resultsGrid');
        const resultsTitle = document.getElementById('resultsTitle');
        const spinner = document.getElementById('spinner');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const closeModal = document.getElementById('closeModal');

        const urlParams = new URLSearchParams(window.location.search);
        const apiKey = urlParams.get('key') || '';

        function getApiUrl(endpoint) {
            let url = endpoint;
            if (apiKey) {
                url += (url.includes('?') ? '&' : '?') + 'key=' + encodeURIComponent(apiKey);
            }
            return url;
        }

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            resultsGrid.innerHTML = '';
            resultsTitle.style.display = 'none';
            spinner.style.display = 'flex';

            try {
                const res = await fetch(getApiUrl(`/api/v1/search?q=${encodeURIComponent(query)}`));
                const data = await res.json();
                spinner.style.display = 'none';

                if (data.results && data.results.length > 0) {
                    resultsTitle.style.display = 'flex';
                    data.results.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-title">${escapeHtml(item.title)}</div>
                            <span class="card-badge">${escapeHtml(item.site || 'Media')}</span>
                        `;
                        card.addEventListener('click', () => loadEpisodes(item.url, item.title));
                        resultsGrid.appendChild(card);
                    });
                } else {
                    resultsGrid.innerHTML = `<div class="empty-state">No results found for "${escapeHtml(query)}"</div>`;
                }
            } catch (err) {
                spinner.style.display = 'none';
                resultsGrid.innerHTML = `<div class="empty-state">Error connecting to server. Please check your network.</div>`;
            }
        }

        async function loadEpisodes(seriesUrl, title) {
            modalTitle.innerText = title;
            modalBody.innerHTML = '<div class="spinner-container" style="display:flex"><div class="spinner"></div></div>';
            modalOverlay.style.display = 'flex';

            try {
                const res = await fetch(getApiUrl(`/api/v1/episodes?url=${encodeURIComponent(seriesUrl)}`));
                const data = await res.json();
                modalBody.innerHTML = '';

                if (data.episodes && data.episodes.length > 0) {
                    data.episodes.forEach(ep => {
                        const row = document.createElement('div');
                        row.className = 'episode-row';
                        row.innerHTML = `
                            <span class="ep-label">${escapeHtml(ep.label || ep.title || 'Episode')}</span>
                            <button class="btn-download" onclick="resolveAndDownload(this, '${escapeJavaScript(ep.url)}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                Download
                            </button>
                        `;
                        modalBody.appendChild(row);
                    });
                } else {
                    modalBody.innerHTML = `<div class="empty-state">No episode links found.</div>`;
                }
            } catch (err) {
                modalBody.innerHTML = `<div class="empty-state">Failed to fetch episode list.</div>`;
            }
        }

        async function resolveAndDownload(btn, epUrl) {
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px;"></div> Resolving...';
            btn.disabled = true;

            try {
                const res = await fetch(getApiUrl(`/api/v1/resolve?url=${encodeURIComponent(epUrl)}`));
                const data = await res.json();

                if (data.cdn_url || data.direct_url) {
                    const downloadUrl = data.cdn_url || data.direct_url;
                    btn.innerHTML = '✔ Link Ready';
                    
                    // Trigger native browser download
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.target = '_blank';
                    a.download = data.file_name || '';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }, 3000);
                } else {
                    alert('Could not resolve download link.');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Error resolving link.');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        closeModal.addEventListener('click', () => {
            modalOverlay.style.display = 'none';
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.style.display = 'none';
        });

        function escapeHtml(str) {
            return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function escapeJavaScript(str) {
            return (str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }
    </script>
</body>
</html>
